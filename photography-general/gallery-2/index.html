<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="GETZ is an immersive click-and-hold photography landing page with a radial monogram reveal and cinematic project stack."
  />
  <title>Gallery 2 | GETZ Motion Archive</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="canvas" id="portfolio-canvas">
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>
    <div class="grain" aria-hidden="true"></div>

    <header class="chrome">
      <p class="brand">GETZ / archive motion</p>
      <p class="status" id="status-copy">Monogram screen active</p>
    </header>

    <section class="hero-stage screen screen-intro is-active" id="intro-screen" aria-label="Interactive monogram">
      <div class="hero-copy">
        <p class="eyebrow">Split-text portfolio reveal</p>
        <p class="intro-line">The letters and images move on their own. Use the button only when you want the second screen.</p>
      </div>

      <div class="word-grid" aria-hidden="true">
        <div class="scatter-item scatter-item--left" data-x="-260" data-y="-140" data-preview="../images/hero1.JPG" data-detail="Mountain light / 01">
          <span class="scatter-letter">G</span>
          <span class="scatter-label">mountain light / 01</span>
          <img class="scatter-preview" src="../images/hero1.JPG" alt="" />
        </div>

        <div class="scatter-item scatter-item--upper" data-x="-120" data-y="-260" data-preview="../images/hero2.JPG" data-detail="valley frame / 02">
          <span class="scatter-letter">E</span>
          <span class="scatter-label">valley frame / 02</span>
          <img class="scatter-preview" src="../images/hero2.JPG" alt="" />
        </div>

        <div class="scatter-item scatter-item--lower" data-x="150" data-y="240" data-preview="../images/hero3.JPG" data-detail="golden arc / 03">
          <span class="scatter-letter">T</span>
          <span class="scatter-label">golden arc / 03</span>
          <img class="scatter-preview" src="../images/hero3.JPG" alt="" />
        </div>

        <div class="scatter-item scatter-item--right" data-x="280" data-y="100" data-preview="../images/serv-wedding.JPG" data-detail="ceremony trace / 04">
          <span class="scatter-letter">Z</span>
          <span class="scatter-label">ceremony trace / 04</span>
          <img class="scatter-preview" src="../images/serv-wedding.JPG" alt="" />
        </div>
      </div>

      <button class="hold-cta" id="hold-cta" type="button" aria-label="Open the app gallery screen">
        <svg class="hold-ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="hold-ring-track" cx="60" cy="60" r="52"></circle>
          <circle class="hold-ring-progress" id="progress-bar" cx="60" cy="60" r="52"></circle>
        </svg>
        <span class="hold-copy" id="hold-copy">Open gallery</span>
      </button>
    </section>

    <section class="stack-stage screen screen-gallery" id="stack-stage" aria-live="polite" aria-hidden="true">
      <div class="stack-surface" id="stack-surface" aria-label="Project stack"></div>

      <button class="gallery-back" id="gallery-back" type="button">Back to monogram</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
